<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Transfer Money</title>
  <style>
    /* Same style as withdraw - just change header color */
    body { margin:0; font-family:Arial,sans-serif; background:#f0f4f8; min-height:100vh; display:flex; justify-content:center; align-items:center; }
    .container { background:white; width:90%; max-width:480px; border-radius:12px; box-shadow:0 8px 30px rgba(0,0,0,0.12); overflow:hidden; }
    .header { background:#3498db; color:white; padding:25px; text-align:center; font-size:1.5rem; font-weight:600; }
    .form-content { padding:30px 25px; }
    label { display:block; margin-bottom:8px; font-weight:600; color:#2c3e50; }
    input, textarea { width:100%; padding:12px; margin-bottom:20px; border:1px solid #d1d9e0; border-radius:8px; font-size:1rem; box-sizing:border-box; }
    input:focus, textarea:focus { outline:none; border-color:#27ae60; box-shadow:0 0 0 3px rgba(39,174,96,0.15); }
    textarea { resize:vertical; height:80px; }
    button { width:100%; padding:14px; background:#3498db; color:white; border:none; border-radius:8px; font-size:1.1rem; font-weight:600; cursor:pointer; transition:background 0.3s; }
    button:hover { background:#2980b9; }
    button:disabled { background:#95a5a6; cursor:not-allowed; }
    #message { margin-top:20px; padding:12px; border-radius:8px; text-align:center; font-weight:600; }
    .success { background:#d4edda; color:#155724; }
    .error { background:#f8d7da; color:#721c24; }
    .back { text-align:center; margin-top:25px; }
    .back a { color:#3498db; text-decoration:none; font-weight:600; }
  </style>
</head>
<body>

  <div class="container">
    <div class="header">Transfer Money</div>

    <div class="form-content">
      <form id="transferForm">

        <label for="fromAccountNo">Your Account Number *</label>
        <input type="text" id="fromAccountNo" required placeholder="Enter your account number" />

        <label for="toAccountNo">Recipient Account Number *</label>
        <input type="text" id="toAccountNo" required placeholder="Enter recipient account number" />

        <label for="amount">Amount (₹) *</label>
        <input type="number" id="amount" min="1" step="0.01" required placeholder="Enter amount to transfer" />

        <label for="remarks">Remarks (Optional)</label>
        <textarea id="remarks" maxlength="200"></textarea>

        <button type="submit" id="submitBtn">Transfer Now</button>
      </form>

      <div id="message"></div>

      <div class="back">
        <a href="dashboard.html">← Back to Dashboard</a>
      </div>
    </div>
  </div>

  <script>

    document.getElementById("transferForm").addEventListener("submit", async function(e) {
      e.preventDefault();

      const token = localStorage.getItem("token");
      if (!token) {
        alert("Please login first");
        window.location.href = "login.html";
        return;
      }

      const accountNo = document.getElementById("fromAccountNo").value.trim();
      const toAccountNo = document.getElementById("toAccountNo").value.trim();
      const amount = document.getElementById("amount").value.trim();

      if (!fromAccountNo || !toAccountNo || !amount || Number(amount) <= 0) {
        showMessage("Please fill all fields correctly", "error");
        return;
      }

      const messageDiv = document.getElementById("message");
      const submitBtn = document.getElementById("submitBtn");
      const remarks = document.getElementById("remarks").value.trim();

      showMessage("Processing transfer...", "info");
      submitBtn.disabled = true;
      submitBtn.textContent = "Transferring...";

        const res = await fetch("/api/v1/transactions/transfer", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify({
            accountNo,
            toAccountNo,
            amount: parseFloat(amount),
            remarks: remarks
          })
        });

        const data = await res.json();
        console.log(data);
        try{
        if (res.ok) {
          showMessage(`Transfer successful! New Balance: ₹${data.newBalance}`, "success");
          submitBtn.textContent = "Transfer Done";
          // setTimeout(() => window.location.href = "dashboard.html", 3000);
        } else {
          showMessage(data.message || "Transfer failed", "error");
          submitBtn.disabled = false;
          submitBtn.textContent = "Transfer Now";
        }
      } catch (err) {
        showMessage("Network error. Please check connection.", "error");
        submitBtn.disabled = false;
        submitBtn.textContent = "Transfer Now";
      }
    });

    function showMessage(text, type) {
      const msg = document.getElementById("message");
      msg.textContent = text;
      msg.className = type;
    }
  </script>
</body>
</html>

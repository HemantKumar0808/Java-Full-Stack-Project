<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create New Bank Account</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      width: 90%;
      max-width: 500px;
      border-radius: 12px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
      overflow: hidden;
    }

    .header {
      background: #1e3c72;
      color: white;
      padding: 25px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
    }

    .form-content {
      padding: 30px 25px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #2c3e50;
    }

    select,
    input[type="number"] {
      width: 100%;
      padding: 12px;
      margin-bottom: 20px;
      border: 1px solid #d1d9e0;
      border-radius: 8px;
      font-size: 1rem;
      box-sizing: border-box;
    }

    select:focus,
    input:focus {
      outline: none;
      border-color: #3498db;
      box-shadow: 0 0 0 3px rgba(52, 152, 219, 0.15);
    }

    button {
      width: 100%;
      padding: 14px;
      background: #27ae60;
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #219653;
    }

    button:disabled {
      background: #95a5a6;
      cursor: not-allowed;
    }

    #message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: 600;
    }

    .success {
      background: #d4edda;
      color: #155724;
    }

    .error {
      background: #f8d7da;
      color: #721c24;
    }

    .back {
      text-align: center;
      margin-top: 25px;
    }

    .back a {
      color: #1e3c72;
      text-decoration: none;
      font-weight: 600;
    }
  </style>
</head>

<body>

  <div class="container">
    <div class="header">
      Create New Bank Account
    </div>

    <div class="form-content">
      <form id="accountForm">

        <label>Select Account Type *</label>
        <select id="accountType" required>
          <option value="">-- Select Account Type --</option>
          <option value="SAVINGS">Savings Account</option>
          <option value="CURRENT">Current Account</option>
          <option value="FIXED_DEPOSIT">Fixed Deposit</option>
        </select>

        <label>Initial Deposit (₹) - Optional</label>
        <input type="number" id="initialDeposit" min="0" step="0.01" placeholder="Enter amount (0 if no deposit)" />

        <button type="submit" id="submitBtn">Create Account</button>
      </form>

      <div id="message"></div>

      <div class="back">
        <a href="dashboard.html">← Back to Dashboard</a>
      </div>
    </div>
  </div>

  <script>

    document.getElementById("accountForm").addEventListener("submit", async (e) => {
      e.preventDefault();

      const token = localStorage.getItem("token");

      if (!token) {
        alert("please login first");
        window.location.href = "login.html";
        return;
      }


      const accountType = document.getElementById("accountType").value.toUpperCase();
      const initialDeposit = parseFloat(document.getElementById("initialDeposit").value);

      const messageDiv = document.getElementById("message");
      const submitBtn = document.getElementById("submitBtn");

      messageDiv.textContent = "Processing your request...";
      submitBtn.disabled = true;
      submitBtn.textContent = "Creating...";



      const response = await fetch("/api/v1/accounts/create", {
        method: 'POST',
        headers: {
          "Content-Type": "application/json",
          "Authorization": "Bearer " + token
        },
        body: JSON.stringify({ accountType, initialDeposit })
      })

      const data = await response.json();

      console.log(data);

      try {
        if (response.ok) {
          setTimeout(() => {
            messageDiv.className = "success"
            messageDiv.textContent = data.message;
            submitBtn.textContent = "Account Created!";
            submitBtn.style.backgroundColor = "green";
          }, 1000)
        } else {
          messageDiv.className = "error";
          messageDiv.textContent = data.message;
          submitBtn.textContent = "Reload page and try again";
          setTimeout(function () {
            location.reload();
            submitBtn.disabled = false;
          }, 10000);
        }
      } catch (error) {
        messageDiv.className = "error";
        messageDiv.textContent = "Network error. Please check your connection.";
        submitBtn.disabled = false;
        submitBtn.textContent = "Create Account";
      }

    })
  </script>

</body>

</html>
